<!-- 圖庫來源:vhead 標題 + 說明,下方來源清單,底部新增來源 -->
<div class="vhead">
  <h1>圖庫來源</h1>
  <p>註冊多個物理根(舊 GDrive、新硬碟、本機)。檔案絕不搬動,只就地索引。</p>
</div>

<div class="panel-pad">
  @if (error()) {
    <div class="note">{{ error() }}</div>
  }

  @if (loading() && roots().length === 0) {
    <div class="note">載入中…</div>
  } @else if (roots().length === 0) {
    <div class="note">尚無圖庫來源。點下方「新增來源」註冊一個資料夾根。</div>
  }

  <!-- 每個來源一列(mockup .root) -->
  @for (r of roots(); track r.id) {
    <div class="root">
      <!-- 資料夾 icon -->
      <div class="ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        </svg>
      </div>

      <!-- 名稱 + 路徑 -->
      <div class="rmeta">
        <div class="rname">{{ r.name }}</div>
        <div class="rpath">{{ r.absPath }}</div>
      </div>

      <!-- 右側:重新掃描 -->
      <div class="rstat">
        <button class="btn btn-ghost rescan" (click)="onRescan(r.id)" [disabled]="scanning() === r.id">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4" />
          </svg>
          {{ scanning() === r.id ? '掃描中…' : '重新掃描' }}
        </button>
      </div>
    </div>
  }

  <!-- 底部新增來源(inline 表單,取代原生 prompt) -->
  @if (adding()) {
    <div class="add-form">
      <input
        #pi
        class="af-in"
        type="text"
        placeholder="來源資料夾絕對路徑(例:D:/pics,正斜線免跳脫)"
        (keydown.enter)="ni.focus()"
      />
      <input
        #ni
        class="af-in"
        type="text"
        placeholder="來源名稱(可留空 = 用路徑)"
        (keydown.enter)="submitAdd(pi.value, ni.value, pi)"
      />
      <div class="af-acts">
        <button class="btn primary" (click)="submitAdd(pi.value, ni.value, pi)">新增</button>
        <button class="btn btn-ghost" (click)="adding.set(false)">取消</button>
      </div>
    </div>
  } @else {
    <button class="btn add-source" (click)="adding.set(true)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 5v14M5 12h14" />
      </svg>
      新增來源
    </button>
  }
</div>
