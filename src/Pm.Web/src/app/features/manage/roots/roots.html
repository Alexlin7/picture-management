<!-- 圖庫來源:vhead 標題 + 說明,下方來源清單,底部新增來源 -->
<div class="vhead">
  <h1>圖庫來源</h1>
  <p>註冊多個物理根(舊 GDrive、新硬碟、本機)。檔案絕不搬動,只就地索引。</p>
</div>

<div class="panel-pad">
  <!-- 每個來源一列(mockup .root) -->
  @for (r of roots(); track r.path; let i = $index) {
    <div class="root">
      <!-- 資料夾 icon -->
      <div class="ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
          <path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        </svg>
      </div>

      <!-- 名稱 + 路徑 + 狀態點 -->
      <div class="rmeta">
        <div class="rname">{{ r.name }}</div>
        <div class="rpath">{{ r.path }}</div>
        <div class="status-dot">
          <span
            class="dot"
            [style.color]="r.status === 'warn' ? '#FBBF24' : '#4ADE80'"
            [style.background]="r.status === 'warn' ? '#FBBF24' : '#4ADE80'"
          ></span>
          {{ r.status === 'warn' ? '待確認' : '就緒' }} · 上次掃描 {{ r.scan }}
        </div>
      </div>

      <!-- 右側檔數 + 重新掃描 -->
      <div class="rstat">
        <div class="rfiles"><b>{{ r.files.toLocaleString() }}</b> 檔</div>
        <button class="btn btn-ghost rescan" (click)="onRescan(i)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4" />
          </svg>
          {{ scanning() === i ? '掃描中…' : '重新掃描' }}
        </button>
      </div>
    </div>
  }

  <!-- 底部新增來源 -->
  <button class="btn add-source" (click)="onAddSource()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M5 12h14" />
    </svg>
    新增來源
  </button>
</div>
