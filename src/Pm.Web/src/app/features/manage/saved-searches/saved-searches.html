<!-- 收藏的搜尋:vhead 標題 + 說明,下方卡片格 -->
<div class="vhead">
  <h1>收藏的搜尋</h1>
  <p>存的是查詢,不是資料夾。同一張圖可以同時出現在多個搜尋裡 —— 多軸交集不會爆炸。</p>
</div>

<div class="panel-pad">
  @if (error()) {
    <div class="note">{{ error() }}</div>
  }

  @if (loading() && saved().length === 0) {
    <div class="note">載入中…</div>
  } @else if (saved().length === 0) {
    <div class="note">還沒有收藏的搜尋。在圖庫裡收藏查詢就會出現在這裡。</div>
  }

  <div class="saved-grid">
    @for (s of saved(); track s.id) {
      <!-- 卡片是容器(非 button):主動作與刪除鈕為兩個並排的真 button,不再巢狀;
           刪除鈕常駐 DOM,滑鼠 hover / 鍵盤 focus-within 時由 CSS 顯示(鍵盤可達)。 -->
      <div class="saved" [class.on]="active() === s.id">
        <button type="button" class="saved-main" (click)="onPick(s.id)">
          <span class="st-title">{{ s.title }}</span>
          <span class="sq">{{ s.query }}</span>
        </button>
        <button
          type="button"
          class="del"
          [attr.aria-label]="'刪除收藏「' + s.title + '」'"
          (click)="onDelete(s.id, $event)"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M6 6 18 18M18 6 6 18" />
          </svg>
        </button>
      </div>
    }
  </div>
</div>
