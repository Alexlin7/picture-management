<div class="main">
  <!-- 頂欄 topbar:搜尋列 + 儲存搜尋 + 掃描 -->
  <div class="topbar">
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7" />
        <path d="m20 20-3.5-3.5" />
      </svg>
      @for (t of tokens(); track $index) {
        <span class="tok" [style]="tokenStyle(t)">
          <b>{{ t.text }}</b>
          <span class="x" (click)="removeToken($index, $event)">×</span>
        </span>
      }
      <input placeholder="加標籤 · 空格=AND · -排除" />
    </div>
    <button class="btn ghost" title="儲存目前搜尋">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="m12 17-5.5 3 1-6.2L3 9.3l6.2-.9L12 3l2.8 5.4 6.2.9-4.5 4.5 1 6.2z" />
      </svg>儲存搜尋
    </button>
    <button class="btn primary">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12a9 9 0 1 1-3-6.7M21 4v4h-4" />
      </svg>掃描
    </button>
  </div>

  <!-- toolbar:命中數 · 已選 · WD14 佇列 + 兩段式檢視切換 -->
  <div class="toolbar">
    <span class="count">符合 <b>{{ hitCountText() }}</b> 張 · 已選 <b>{{ selCount() }}</b></span>
    <span class="status-dot">
      <span class="dot" style="color:var(--color-t-meta);background:var(--color-t-meta)"></span>
      WD14 佇列 <b class="num">{{ wd14QueueText() }}</b> 待標
    </span>
    <div class="seg">
      <button [class.on]="viewMode() === 'dense'" (click)="viewMode.set('dense')" title="小圖密集">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
        </svg>
      </button>
      <button [class.on]="viewMode() === 'large'" (click)="viewMode.set('large')" title="大圖">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <rect x="3" y="3" width="8" height="8" rx="1" />
          <rect x="13" y="3" width="8" height="18" rx="1" />
          <rect x="3" y="13" width="8" height="8" rx="1" />
        </svg>
      </button>
    </div>
  </div>

  <!-- masonry 圖牆 -->
  <div class="view">
    <div class="masonry">
      @for (p of photos; track p.id) {
        <div class="tile" [class.sel]="selectedId() === p.id" (click)="pick(p)">
          <div class="art" [style.background]="art(p.seed)" [style.height.px]="tileHeight(p)"></div>
          <div class="chips">
            @for (c of chips(p); track $index) {
              <span class="mini">
                <span class="d" [style.background]="kindColor(c.kind)"></span>{{ c.name }}
              </span>
            }
          </div>
          @if (p.personal) {
            <span class="badge-photo">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3z" />
                <circle cx="12" cy="13" r="3.2" />
              </svg>可能是照片
            </span>
          }
          @if (p.dup) {
            <span class="dupflag">2 份</span>
          }
          <div class="meta">
            <div class="ttl">{{ p.title }}</div>
            <div class="ser">{{ p.series }}</div>
          </div>
        </div>
      }
    </div>
  </div>
</div>
